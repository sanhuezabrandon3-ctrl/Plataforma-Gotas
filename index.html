<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Gotas</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://tzboptemotfalyufgbaj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Ym9wdGVtb3RmYWx5dWZnYmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTI1NDAsImV4cCI6MjA5NzE4ODU0MH0.Br5rqKJeONj93f8UayTYiKETFoFpnr-q4Nx-lba3sFQ';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
</head>
<body>

    <h1>Lista de Clientes</h1>
    <ul id="lista-clientes"></ul>

    <script>
        async function cargarClientes() {
            try {
                console.log("Conectando con Supabase...");
                const { data, error } = await supabase.from('clientes').select('nombre');
                
                if (error) throw error;
                
                const lista = document.getElementById('lista-clientes');
                lista.innerHTML = "";
                
                if (data && data.length > 0) {
                    data.forEach(cliente => {
                        const li = document.createElement('li');
                        li.textContent = cliente.nombre;
                        lista.appendChild(li);
                    });
                } else {
                    lista.innerHTML = "<li>No hay clientes registrados.</li>";
                }
            } catch (err) {
                console.error("Error al obtener clientes:", err.message);
                document.getElementById('lista-clientes').innerHTML = "<li>Error al cargar datos.</li>";
            }
        }
        window.addEventListener('load', cargarClientes);
    </script>

</body>
</html>
