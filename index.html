<title>Gotas Comunicación SPA — Plataforma de Gestión</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #a0b9f2; --bg2: #ddded9; --text: #0a0d00; --text2: #0a0d00; --text3: #0a0d00;
    --border: #0928db; --border2: #d9cf16; --info: #d9cf16; --danger: #A32D2D;
    --radius: 8px; --radius-sm: 5px; --mono: 'Courier New', monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1c1c1e; --bg2:#2c2c2e; --text:#f5f5f0; --text2:#a8a6a0; --text3:#6b6a66; --border:#3a3a3c; --border2:#48484a; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); }
  #app { display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 220px; background: var(--bg2); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar .brand { padding: 14px 16px; border-bottom: 0.5px solid var(--border); }
  #sidebar .brand .logo { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; color: var(--text); }
  #sidebar .brand .logo i { font-size: 18px; color: var(--info); }
  #sidebar .brand .sub { font-size: 10px; color: var(--text2); margin-top: 3px; }
  #sidebar nav { flex: 1; padding: 8px; overflow-y: auto; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13px; margin-bottom: 2px; border: 0.5px solid transparent; text-decoration: none; }
  .nav-item:hover { background: var(--bg); }
  .nav-item.active { background: var(--bg); color: var(--text); border-color: var(--border); }
  .nav-item i { font-size: 16px; }
  .nav-section { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 12px 12px 4px; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar { padding: 12px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; background: var(--bg); }
  #topbar h1 { font-size: 16px; font-weight: 500; }
  #topbar .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th { text-align: left; padding: 8px 12px; font-weight: 500; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  .data-table td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--bg2); }
  .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
  .badge-green { background: #EAF3DE; color: #3B6D11; }
  .badge-amber { background: #FAEEDA; color: #854F0B; }
  .badge-blue { background: #E6F1FB; color: #185FA5; }
  .badge-red { background: #FCEBEB; color: #A32D2D; }
  .badge-gray { background: #F1EFE8; color: #5F5E5A; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .field input, .field select, .field textarea { border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 13px; background: var(--bg); color: var(--text); width: 100%; }
  .field textarea { resize: vertical; min-height: 60px; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; border: 0.5px solid var(--border); }
  .stat-card .lbl { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .stat-card .val { font-size: 22px; font-weight: 500; }
  .stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 24px; width: 600px; max-width: 95vw; max-height: 88vh; overflow-y: auto; }
  .modal h2 { font-size: 15px; font-weight: 500; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 0.5px solid var(--border); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .search-box, .filter-select { border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 13px; background: var(--bg2); color: var(--text); }
  .search-box { width: 220px; }
  .pager { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 13px; color: var(--text2); }
  /* OT OFICIAL */
  .ot-wrap { background: white; color: #111; font-family: Arial, sans-serif; font-size: 11px; border: 1px solid #ccc; border-radius: 6px; overflow: hidden; max-width: 780px; }
  .ot-header { background: #1a3a6b; color: white; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .ot-header .empresa { font-size: 14px; font-weight: 700; }
  .ot-header .sub { font-size: 10px; opacity: 0.85; margin-top: 2px; }
  .ot-header .num-orden { text-align: right; }
  .ot-header .num-orden .label { font-size: 10px; opacity: 0.8; }
  .ot-header .num-orden .num { font-size: 20px; font-weight: 700; }
  .ot-tipos { display: flex; gap: 12px; padding: 6px 14px; border-bottom: 1px solid #ddd; background: #f5f7fa; font-size: 10px; }
  .ot-tipo-box { display: flex; align-items: center; gap: 5px; }
  .ot-tipo-box .check { width: 13px; height: 13px; border: 1px solid #666; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #1a3a6b; }
  .ot-info { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #ddd; }
  .ot-info-col { padding: 8px 14px; }
  .ot-info-col:first-child { border-right: 1px solid #ddd; }
  .ot-kv { display: flex; align-items: baseline; gap: 4px; margin-bottom: 4px; font-size: 11px; }
  .ot-kv .k { color: #555; white-space: nowrap; }
  .ot-kv .v { font-weight: 600; border-bottom: 1px solid #aaa; flex: 1; min-height: 15px; }
  .ot-table { width: 100%; border-collapse: collapse; font-size: 10px; }
  .ot-table th { background: #1a3a6b; color: white; padding: 5px 7px; text-align: left; font-weight: 600; border: 1px solid #1a3a6b; }
  .ot-table td { padding: 4px 7px; border: 1px solid #ddd; min-height: 18px; }
  .ot-table tr:nth-child(even) td { background: #f9f9f9; }
  .ot-obs { padding: 7px 14px; border-top: 1px solid #ddd; }
  .ot-obs .label { font-weight: 600; font-size: 10px; color: #555; margin-bottom: 3px; }
  .ot-obs .val { border: 1px solid #ddd; min-height: 38px; padding: 4px; font-size: 11px; border-radius: 2px; background: #fafafa; }
  .ot-footer { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #ddd; }
  .ot-footer-col { padding: 8px 14px; }
  .ot-footer-col:first-child { border-right: 1px solid #ddd; }
  .ot-footer-col .title { font-weight: 700; font-size: 10px; text-transform: uppercase; color: #1a3a6b; margin-bottom: 5px; border-bottom: 1px solid #1a3a6b; padding-bottom: 2px; }
  .ot-footer-kv { font-size: 10px; margin-bottom: 4px; display: flex; align-items: baseline; gap: 4px; }
  .ot-footer-kv .k { color: #555; white-space: nowrap; }
  .ot-footer-kv .v { border-bottom: 1px solid #aaa; flex: 1; min-height: 14px; font-weight: 600; }
  .ot-bottom { background: #1a3a6b; color: white; padding: 5px 14px; font-size: 9px; text-align: center; }
  @media print {
    #sidebar, #topbar, .btn, .pager { display: none !important; }
    #main { display: block; }
    #content { padding: 0; overflow: visible; }
    .ot-wrap { border: none; border-radius: 0; max-width: 100%; }
  }
  @media (max-width: 640px) {
    #sidebar { width: 48px; }
    #sidebar .brand .logo span, #sidebar .brand .sub, .nav-item span, .nav-section { display: none; }
    .nav-item { justify-content: center; padding: 10px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .search-box { width: 140px; }
  }
</style>

function buildDefaultDB() {
  let cid=1;
  const clientes=CLIENTES_DEFAULT.map(n=>({id:cid++,nombre:n,rut:'',contacto:'',telefono:'',email:''}));
  let iid=1;
  const instalaciones=[];
  INSTALACIONES_DEFAULT.forEach(g=>{
    const cl=clientes.find(c=>c.nombre===g.c);
    if(cl) g.n.forEach(n=>instalaciones.push({id:iid++,nombre:n,clienteId:cl.id,direccion:'',ciudad:'',tipo:''}));
  });
  return {clientes,instalaciones,tecnicos:JSON.parse(JSON.stringify(TECNICOS_DEFAULT)),notas:[],equipos:JSON.parse(JSON.stringify(EQUIPOS_DEFAULT)),nextId:{cliente:cid,instalacion:iid,tecnico:4,nota:1,equipo:200}};
}

function loadDB(){try{const r=localStorage.getItem(DB_KEY);if(r)return JSON.parse(r);}catch(e){}const d=buildDefaultDB();saveDB(d);return d;}
function saveDB(d){try{localStorage.setItem(DB_KEY,JSON.stringify(d));}catch(e){}}

let db=loadDB();
let clientePage=1,instPage=1; const CPP=25;

const $=id=>document.getElementById(id);
function getCliente(id){return db.clientes.find(c=>c.id===id);}
function getInstalacion(id){return db.instalaciones.find(i=>i.id===id);}
function getTecnico(id){return db.tecnicos.find(t=>t.id===id);}

function showView(view){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.querySelector(`[data-view="${view}"]`);
  if(nav) nav.classList.add('active');
  const titles={dashboard:'Dashboard',clientes:'Clientes',instalaciones:'Instalaciones',equipos:'Equipos',tecnicos:'Técnicos',notas:'Órdenes de Trabajo','nueva-nota':'Nueva Orden de Trabajo',informes:'Informes de Visita a Terreno','nuevo-informe':'Nuevo Informe de Visita'};
  $('page-title').textContent=titles[view]||view;
  $('topbar-actions').innerHTML='';
  ({dashboard:renderDashboard,clientes:renderClientes,instalaciones:renderInstalaciones,equipos:renderEquipos,tecnicos:renderTecnicos,notas:renderNotas,'nueva-nota':renderNuevaNota,informes:renderInformes,'nuevo-informe':renderNuevoInforme})[view]?.();
}

function renderDashboard(){
  const rf=db.equipos.filter(e=>!['Batería','Cargador','Manos libres'].includes(e.tipo));
  const tipos={};rf.forEach(e=>{tipos[e.tipo]=(tipos[e.tipo]||0)+1;});
  $('content').innerHTML=`
    <div class="stats-row">
      <div class="stat-card"><div class="lbl">Clientes</div><div class="val">${db.clientes.length}</div></div>
      <div class="stat-card"><div class="lbl">Instalaciones</div><div class="val">${db.instalaciones.length}</div></div>
      <div class="stat-card"><div class="lbl">OT emitidas</div><div class="val">${db.notas.length}</div><div class="sub">${db.notas.filter(n=>n.firmado).length} firmadas</div></div>
      <div class="stat-card"><div class="lbl">Informes de visita</div><div class="val">${(db.informes||[]).length}</div></div>
    </div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:500">Stock por tipo</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
      ${Object.entries(tipos).map(([t,c])=>`<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 16px"><div style="font-size:11px;color:var(--text2)">${t}</div><div style="font-size:20px;font-weight:500">${c}</div></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="showView('nueva-nota')"><i class="ti ti-file-plus"></i> Nueva OT</button>
      <button class="btn btn-primary" onclick="showView('nuevo-informe')" style="background:#2d6a4f;border-color:#2d6a4f"><i class="ti ti-clipboard-plus"></i> Nuevo Informe</button>
      <button class="btn" onclick="showView('notas')"><i class="ti ti-file-text"></i> Ver OTs</button>
      <button class="btn" onclick="showView('equipos')"><i class="ti ti-device-walkie-talkie"></i> Inventario</button>
    </div>`;
}

  const q=($('sc')||{}).value||'';
  const lista=db.clientes.filter(c=>c.nombre.toLowerCase().includes(q.toLowerCase()));
  const pages=Math.ceil(lista.length/CPP)||1;
  if(clientePage>pages) clientePage=pages;
  const slice=lista.slice((clientePage-1)*CPP,clientePage*CPP);

function guardarNota(){
  const fc=$('nd-fc').value, fe=$('nd-fe').value, tipo=$('nd-tipo').value;
  const clienteId=parseInt($('nd-cliente').value)||null;
  const instalacionId=parseInt($('nd-inst').value)||null;
  const tecnicoId=parseInt($('nd-tec').value)||null;
  const receptor=$('nd-rnombre').value, receptorRut=$('nd-rrut').value, obs=$('nd-obs').value;
  if(!fc||!clienteId){alert('Completa la fecha de creación y el cliente.');return;}
  const equipos=[];
  for(let i=0;i<10;i++){const sel=$('eq-sel-'+i);if(sel&&sel.value)equipos.push({equipoId:parseInt(sel.value),cantidad:$('eq-cant-'+i).value||1,retirado:($('eq-ret-'+i)||{}).value||''});}
  const firma=sigCanvas?sigCanvas.toDataURL():null;
  const hasFirma=firma&&sigCtx&&sigCtx.getImageData(0,0,sigCanvas.width,sigCanvas.height).data.some(v=>v!==0);
  const nota={id:db.nextId.nota,numero:'OT-'+String(db.nextId.nota).padStart(4,'0'),fechaCreacion:fc,fechaEjecucion:fe,tipo,clienteId,instalacionId,tecnicoId,receptor,receptorRut,equipos,observaciones:obs,firma:hasFirma?firma:null,firmado:hasFirma};

}

function renderInformes(){
  if(!db.informes) db.informes=[];
  $('topbar-actions').innerHTML=`<button class="btn btn-primary" onclick="showView('nuevo-informe')"><i class="ti ti-clipboard-plus"></i> Nuevo Informe</button>`;
  $('content').innerHTML=`<table class="data-table"><thead><tr><th>N° Informe</th><th>Fecha</th><th>Cliente</th><th>Instalación</th><th>Ciudad</th><th>Técnico</th><th></th></tr></thead>
    <tbody>${db.informes.length?db.informes.slice().reverse().map(inf=>{const cl=getCliente(inf.clienteId);const ins=getInstalacion(inf.instalacionId);const tec=getTecnico(inf.tecnicoId);return`<tr>
      <td style="font-weight:600;color:#2d6a4f">${inf.numero}</td>
      <td>${inf.fecha||'—'}</td>
      <td>${cl?cl.nombre:'—'}</td>
      <td>${ins?ins.nombre:'—'}</td>

          <div class="ot-kv"><span class="k">Cliente :</span><span class="v" id="pv-cl"></span></div>
          <div class="ot-kv"><span class="k">Instalación :</span><span class="v" id="pv-inst"></span></div>
        </div>
        <div class="ot-info-col">
          <div class="ot-kv"><span class="k">Ciudad :</span><span class="v" id="pv-ciudad"></span></div>

      <div style="padding:6px 14px;border-bottom:1px solid #ddd">

      </div>
      <div class="ot-obs" style="border-bottom:1px solid #ddd">

  bv('iv-fecha','pv-fecha'); bv('iv-ciudad','pv-ciudad'); bv('iv-dir','pv-dir');
  bv('iv-desc','pv-desc'); bv('iv-obs','pv-obs'); bv('iv-rec','pv-rec');
  $('iv-cliente').addEventListener('change',e=>{const cl=getCliente(parseInt(e.target.value));$('pv-cl').textContent=cl?cl.nombre:'';});
  $('iv-inst').addEventListener('change',e=>{const i=getInstalacion(parseInt(e.target.value));$('pv-inst').textContent=i?i.nombre:'';});
  $('iv-tec').addEventListener('change',e=>{const t=getTecnico(parseInt(e.target.value));if(t){$('pv-tec').textContent=t.nombre;$('pv-rut-tec').textContent=t.rut||'';}});

function guardarInforme(){
  if(!db.informes) db.informes=[];
  if(!db.nextId.informe) db.nextId.informe=1;
  const fecha=$('iv-fecha').value;
  const clienteId=parseInt($('iv-cliente').value)||null;
  const instalacionId=parseInt($('iv-inst').value)||null;
  const tecnicoId=parseInt($('iv-tec').value)||null;
  const ciudad=$('iv-ciudad').value;
  const direccion=$('iv-dir').value;
  const descripcion=$('iv-desc').value;
  const observaciones=$('iv-obs').value;
  const recomendaciones=$('iv-rec').value;
  if(!fecha||!clienteId){alert('Completa la fecha y el cliente.');return;}
  const inf={id:db.nextId.informe,numero:'IV-'+String(db.nextId.informe).padStart(4,'0'),fecha,clienteId,instalacionId,tecnicoId,ciudad,direccion,descripcion,observaciones,recomendaciones};
  db.informes.push(inf);db.nextId.informe++;saveDB(db);verInforme(inf.id);
}

  $('topbar-actions').innerHTML=`<button class="btn" onclick="showView('informes')"><i class="ti ti-arrow-left"></i> Volver</button><button class="btn" onclick="window.print()"><i class="ti ti-printer"></i> Imprimir</button>`;

      </div>
      <div class="ot-info-col">
        <div class="ot-kv"><span class="k">Ciudad :</span><span class="v">${inf.ciudad||''}</span></div>
        <div class="ot-kv"><span class="k">Dirección :</span><span class="v">${inf.direccion||''}</span></div>
      </div>
    </div>
    <div style="padding:6px 14px;border-bottom:1px solid #ddd">
      <div class="ot-kv"><span class="k">Fecha de Visita :</span><span class="v">${inf.fecha||''}</span></div>
    </div>
    <div class="ot-obs" style="border-bottom:1px solid #ddd">
      <div class="label" style="color:#2d6a4f">Descripción de instalación</div>
      <div class="val">${inf.descripcion||''}</div>

      <div class="val">${inf.observaciones||''}</div>
    </div>

        <div class="ot-footer-kv"><span class="k">Nombre y Apellido :</span><span class="v">${tec?tec.nombre:''}</span></div>
        <div class="ot-footer-kv"><span class="k">RUT :</span><span class="v">${tec?tec.rut||'':''}</span></div>
        <div class="ot-footer-kv"><span class="k">Timbre Gotas :</span><span class="v" style="min-height:40px"></span></div>

}

// MODALS
const MODALS={
  cliente:{title:'Cliente',fields:(d={})=>`<div class="form-grid"><div class="field" style="grid-column:span 2"><label>Nombre / Razón social</label><input id="f-nombre" value="${d.nombre||''}"></div><div class="field"><label>RUT</label><input id="f-rut" value="${d.rut||''}"></div><div class="field"><label>Contacto</label><input id="f-contacto" value="${d.contacto||''}"></div><div class="field"><label>Teléfono</label><input id="f-telefono" value="${d.telefono||''}"></div><div class="field"><label>Email</label><input id="f-email" value="${d.email||''}"></div></div>`,
    save:(id)=>{const d={nombre:$('f-nombre').value,rut:$('f-rut').value,contacto:$('f-contacto').value,telefono:$('f-telefono').value,email:$('f-email').value};if(!d.nombre){alert('Nombre obligatorio');return;}if(id){Object.assign(db.clientes.find(c=>c.id===id),d);}else{db.clientes.push({id:db.nextId.cliente++,...d});}saveDB(db);closeModal();renderClientes();}},
  instalacion:{title:'Instalación',fields:(d={})=>`<div class="form-grid"><div class="field" style="grid-column:span 2"><label>Nombre</label><input id="f-nombre" value="${d.nombre||''}"></div><div class="field"><label>Cliente</label><select id="f-cid"><option value="">Seleccionar...</option>${db.clientes.map(c=>`<option value="${c.id}" ${d.clienteId===c.id?'selected':''}>${c.nombre}</option>`).join('')}</select></div><div class="field"><label>Tipo</label><input id="f-tipo" value="${d.tipo||''}"></div><div class="field" style="grid-column:span 2"><label>Dirección</label><input id="f-dir" value="${d.direccion||''}"></div><div class="field"><label>Ciudad</label><input id="f-ciudad" value="${d.ciudad||''}"></div></div>`,
    save:(id)=>{const d={nombre:$('f-nombre').value,clienteId:parseInt($('f-cid').value)||null,tipo:$('f-tipo').value,direccion:$('f-dir').value,ciudad:$('f-ciudad').value};if(!d.nombre){alert('Nombre obligatorio');return;}if(id){Object.assign(db.instalaciones.find(i=>i.id===id),d);}else{db.instalaciones.push({id:db.nextId.instalacion++,...d});}saveDB(db);closeModal();renderInstalaciones();}},
  equipo:{title:'Equipo',fields:(d={})=>`<div class="form-grid"><div class="field"><label>Marca</label><input id="f-marca" value="${d.marca||''}"></div><div class="field"><label>Modelo</label><input id="f-modelo" value="${d.modelo||''}"></div><div class="field"><label>Tipo</label><select id="f-tipo"><option ${d.tipo==='Portátil'?'selected':''}>Portátil</option><option ${d.tipo==='Portátil POC'?'selected':''}>Portátil POC</option><option ${d.tipo==='Móvil'?'selected':''}>Móvil</option><option ${d.tipo==='Móvil POC'?'selected':''}>Móvil POC</option><option ${d.tipo==='Repetidor'?'selected':''}>Repetidor</option><option ${d.tipo==='Batería'?'selected':''}>Batería</option><option ${d.tipo==='Cargador'?'selected':''}>Cargador</option></select></div><div class="field"><label>Banda</label><select id="f-banda"><option>UHF</option><option>VHF</option><option>POC</option><option>-</option></select></div><div class="field"><label>N° Serie</label><input id="f-serie" value="${d.serie||''}"></div><div class="field"><label>Estado</label><select id="f-estado"><option>Disponible</option><option>Arrendado</option><option>Instalado</option><option>En reparación</option><option>Vendido</option></select></div><div class="field" style="grid-column:span 2"><label>Cliente asignado</label><select id="f-cid"><option value="">Sin asignar</option>${db.clientes.map(c=>`<option value="${c.id}" ${d.clienteId===c.id?'selected':''}>${c.nombre}</option>`).join('')}</select></div></div>`,
    save:(id)=>{const d={marca:$('f-marca').value,modelo:$('f-modelo').value,tipo:$('f-tipo').value,banda:$('f-banda').value,serie:$('f-serie').value,estado:$('f-estado').value,clienteId:parseInt($('f-cid').value)||null};if(!d.marca||!d.serie){alert('Marca y serie obligatorias');return;}if(id){Object.assign(db.equipos.find(e=>e.id===id),d);}else{db.equipos.push({id:db.nextId.equipo++,...d});}saveDB(db);closeModal();renderEquipos();}},
  tecnico:{title:'Técnico',fields:(d={})=>`<div class="form-grid"><div class="field" style="grid-column:span 2"><label>Nombre completo</label><input id="f-nombre" value="${d.nombre||''}"></div><div class="field"><label>RUT</label><input id="f-rut" value="${d.rut||''}"></div><div class="field"><label>Cargo</label><input id="f-cargo" value="${d.cargo||''}"></div><div class="field"><label>Teléfono</label><input id="f-telefono" value="${d.telefono||''}"></div><div class="field"><label>Email</label><input id="f-email" value="${d.email||''}"></div></div>`,
    save:(id)=>{const d={nombre:$('f-nombre').value,rut:$('f-rut').value,cargo:$('f-cargo').value,telefono:$('f-telefono').value,email:$('f-email').value};if(!d.nombre){alert('Nombre obligatorio');return;}if(id){Object.assign(db.tecnicos.find(t=>t.id===id),d);}else{db.tecnicos.push({id:db.nextId.tecnico++,...d});}saveDB(db);closeModal();renderTecnicos();}}
};

function openModal(type,id){
  const cfg=MODALS[type];
  const cols={cliente:db.clientes,instalacion:db.instalaciones,equipo:db.equipos,tecnico:db.tecnicos};
  const d=id?cols[type].find(x=>x.id===id):{};
  $('modal-container').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><h2>${id?'Editar':'Nuevo'} ${cfg.title}</h2>${cfg.fields(d||{})}<div style="display:flex;gap:8px;margin-top:20px;padding-top:14px;border-top:0.5px solid var(--border)"><button class="btn btn-primary" onclick="MODALS['${type}'].save(${id||'null'})"><i class="ti ti-device-floppy"></i> Guardar</button><button class="btn" onclick="closeModal()">Cancelar</button></div></div></div>`;
}
function closeModal(){$('modal-container').innerHTML='';}
function del(col,id,fn){if(!confirm('¿Eliminar este registro?'))return;if(!db[col])db[col]=[];db[col]=db[col].filter(x=>x.id!==id);saveDB(db);fn();}

showView('dashboard');
</script>
</body>
</html>
