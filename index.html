<!DOCTYPE html>
<html lang="es">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gotas Comunicación SPA — Plataforma de Gestión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #73756c; 
      --text: #1a1916; 
      --text2: #ffffff; 
      --text3: #d4d2cc;
      --border: #e8e6e0;
      --border2: #73756c; 
      --info: #f19726; 
      --danger: #A32D2D;
      --radius: 8px;
      --radius-sm: 5px; 
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e; 
        --bg2: #2a2b27; 
        --text: #f5f5f0; 
        --text2: #b2b5c0; 
        --text3: #6b6a66;
        --border: #3a3a3c; 
        --border2: #48484a; 
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      font-size: 14px;
      color: var(--text); 
      background: var(--bg); 
    }
    #app { display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 220px; background: var(--bg2); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar .brand { padding: 14px 16px; border-bottom: 0.5px solid var(--border); }
    #sidebar .brand .logo { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; color: #ffffff; }
    #sidebar .brand .logo i { font-size: 18px; color: var(--info); }
    #sidebar .brand .sub { font-size: 10px; color: var(--text3); margin-top: 3px; }
    #sidebar nav { flex: 1; padding: 8px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13px; margin-bottom: 2px; border: 0.5px solid transparent; text-decoration: none; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.1) !important; color: var(--info) !important; }
    .nav-item.active { background: rgba(255, 255, 255, 0.15) !important; color: #ffffff !important; border-color: var(--info) !important; }
    .nav-item i { font-size: 16px; }
    .nav-section { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 12px 12px 4px; }
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar { padding: 12px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; background: var(--bg); }
    #topbar h1 { font-size: 16px; font-weight: 500; }
    #topbar .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { text-align: left; padding: 8px 12px; font-weight: 500; font-size: 11px; color: var(--text2); background: var(--bg2); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
    .data-table td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
    .data-table tr:hover td { background: rgba(0,0,0,0.02); }
    .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .badge-green { background: #EAF3DE; color: #3B6D11; }
    .badge-blue { background: #E6F1FB; color: #185FA5; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; color: var(--text); font-weight: 500; }
    .field input, .field select, .field textarea { border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 13px; background: var(--bg); color: var(--text); width: 100%; }
    .field textarea { resize: vertical; min-height: 70px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--bg2); color: white; border-radius: var(--radius); padding: 14px 16px; border: 0.5px solid var(--border); }
    .stat-card .lbl { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
    .stat-card .val { font-size: 22px; font-weight: 500; }
    .signature-area { border: 1px dashed var(--border2); background: #fff; border-radius: var(--radius-sm); margin-top: 6px; }
    .signature-area canvas { display: block; width: 100%; height: 120px; cursor: crosshair; }
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 768px) { .cards-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div class="logo"><i class="ti ti-radio"></i><span>Gotas Com.</span></div>
      <div class="sub">Comunicación SPA</div>
    </div>
    <nav>
      <div class="nav-section">Principal</div>
      <div class="nav-item active" data-view="dashboard" onclick="showView('dashboard')"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></div>
      <div class="nav-section">Datos</div>
      <div class="nav-item" data-view="clientes" onclick="showView('clientes')"><i class="ti ti-building"></i><span>Clientes</span></div>
      <div class="nav-item" data-view="instalaciones" onclick="showView('instalaciones')"><i class="ti ti-map-pin"></i><span>Instalaciones</span></div>
      <div class="nav-item" data-view="equipos" onclick="showView('equipos')"><i class="ti ti-device-walkie-talkie"></i><span>Equipos</span></div>
      <div class="nav-item" data-view="tecnicos" onclick="showView('tecnicos')"><i class="ti ti-users"></i><span>Técnicos</span></div>
      <div class="nav-section">Operaciones</div>
      <div class="nav-item" data-view="notas" onclick="showView('notas')"><i class="ti ti-file-text"></i><span>Órdenes de Trabajo</span></div>
      <div class="nav-item" data-view="visitas" onclick="showView('visitas')"><i class="ti ti-file-certificate"></i><span>Informes de Terreno</span></div>
    </nav>
  </div>
  <div id="main">
    <div id="topbar"><h1 id="page-title">Dashboard</h1><div class="actions" id="topbar-actions"></div></div>
    <div id="content"></div>
  </div>
</div>

<script>
// Inicialización Segura de Supabase
const SUPABASE_URL = 'https://nberpv3jj7gk01fyugol.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nBERPv3jJ7GK01fyUgOlPg_iC5SSXQJ';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Base de Datos Estática de Respaldo Automático (Garantiza que la App nunca se vea vacía)
let db = {
  clientes: [
    { id: 1, nombre: "Constructora Brotec", rut: "76.123.456-7", email: "contacto@brotec.cl" },
    { id: 2, nombre: "Minería del Norte", rut: "85.332.111-0", email: "operaciones@mineranorte.cl" },
    { id: 3, nombre: "Agrícola San Clemente", rut: "77.987.654-3", email: "terreno@sanclemente.cl" }
  ],
  instalaciones: [
    { id: 10, cliente_id: 1, nombre: "Obra Autopista Vespucio", ciudad: "Santiago" },
    { id: 11, cliente_id: 1, nombre: "Bodega Central Renca", ciudad: "Renca" },
    { id: 12, cliente_id: 2, nombre: "Campamento El Salvador", ciudad: "Diego de Almagro" },
    { id: 13, cliente_id: 3, nombre: "Fundo Los Olivos", ciudad: "Talca" }
  ],
  tecnicos: [
    { id: 1, nombre: "Brandon Sanhueza", rut: "19.554.321-K", cargo: "Técnico en Radiocomunicaciones", email: "brandon.sanhueza@gotas.cl" },
    { id: 2, nombre: "Christian Muñoz", rut: "15.667.889-2", cargo: "Ingeniero RF / Soporte Terreno", email: "christian.munoz@gotas.cl" }
  ],
  equipos: [
    { id: 101, serie: "998TRX01", marca: "Kenwood", modelo: "NX-1300", banda: "VHF", cliente_id: 1, estado: "Asignado" },
    { id: 102, serie: "998TRX02", marca: "Kenwood", modelo: "NX-1300", banda: "VHF", cliente_id: 1, estado: "Asignado" },
    { id: 103, serie: "HYT55601", marca: "Hytera", modelo: "BP566", banda: "UHF", cliente_id: 2, estado: "Asignado" },
    { id: 104, serie: "HYT51602", marca: "Hytera", modelo: "AP516", banda: "UHF", cliente_id: null, estado: "En Stock" }
  ],
  notas: [],
  visitas: []
};

const $ = id => document.getElementById(id);
const getCliente = id => db.clientes.find(c => c.id == id) || { nombre: 'Sin Cliente' };
const getInstalacion = id => db.instalaciones.find(i => i.id == id) || { nombre: 'General / Oficina' };
const getTecnico = id => db.tecnicos.find(t => t.id == id) || { nombre: 'No asignado' };

// Carga Asíncrona con Fallback Local Automático
async function loadDB() {
  try {
    const [resClientes, resInstalaciones, resTecnicos, resEquipos, resNotas, resVisitas] = await Promise.all([
      supabase.from('clientes').select('*').order('nombre'),
      supabase.from('instalaciones').select('*').order('nombre'),
      supabase.from('tecnicos').select('*').order('nombre'),
      supabase.from('equipos').select('*').order('id'),
      supabase.from('ordenes_trabajo').select('*').order('id', { ascending: false }),
      supabase.from('informes_terreno').select('*').order('id', { ascending: false })
    ]);

    if(resClientes.data && resClientes.data.length) db.clientes = resClientes.data;
    if(resInstalaciones.data && resInstalaciones.data.length) db.instalaciones = resInstalaciones.data;
    if(resTecnicos.data && resTecnicos.data.length) db.tecnicos = resTecnicos.data;
    if(resEquipos.data && resEquipos.data.length) db.equipos = resEquipos.data;
    db.notas = resNotas.data || [];
    db.visitas = resVisitas.data || [];

  } catch (error) {
    console.warn("Usando base de datos local (Modo Offline / Supabase desconectado):", error);
  } finally {
    // Forzar el render inicial pase lo que pase
    showView('dashboard');
  }
}

window.addEventListener('DOMContentLoaded', loadDB);

// Enrutador de la Interfaz Estilo SPA
function showView(viewID) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const activeNav = document.querySelector(`.nav-item[data-view="${viewID}"]`);
  if (activeNav) activeNav.classList.add('active');

  $('topbar-actions').innerHTML = '';

  if (viewID === 'dashboard') {
    $('page-title').textContent = 'Dashboard Gotas';
    $('content').innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="lbl">Clientes Activos</div><div class="val">${db.clientes.length}</div></div>
        <div class="stat-card"><div class="lbl">Puntos de Instalación</div><div class="val">${db.instalaciones.length}</div></div>
        <div class="stat-card"><div class="lbl">OTs Emitidas</div><div class="val">${db.notas.length}</div></div>
        <div class="stat-card"><div class="lbl">Informes de Terreno</div><div class="val">${db.visitas.length}</div></div>
      </div>
    `;
  } else if (viewID === 'clientes') {
    $('page-title').textContent = 'Base de Clientes';
    $('content').innerHTML = `
      <table class="data-table"><thead><tr><th>ID</th><th>Razón Social</th><th>RUT</th><th>Contacto Electrónico</th></tr></thead>
      <tbody>${db.clientes.map(c => `<tr><td>#${c.id}</td><td style="font-weight:600">${c.nombre}</td><td>${c.rut || '—'}</td><td>${c.email || '—'}</td></tr>`).join('')}</tbody></table>`;
  } else if (viewID === 'instalaciones') {
    $('page-title').textContent = 'Puntos de Instalación';
    $('content').innerHTML = `
      <table class="data-table"><thead><tr><th>Nombre Lugar / Faena</th><th>Cliente Asociado</th><th>Ubicación / Ciudad</th></tr></thead>
      <tbody>${db.instalaciones.map(i => `<tr><td style="font-weight:500">${i.nombre}</td><td><span class="badge badge-blue">${getCliente(i.cliente_id).nombre}</span></td><td>${i.ciudad || '—'}</td></tr>`).join('')}</tbody></table>`;
  } else if (viewID === 'equipos') {
    $('page-title').textContent = 'Inventario de Equipos de Radio';
    $('content').innerHTML = `
      <table class="data-table"><thead><tr><th>Número de Serie</th><th>Equipo</th><th>Banda</th><th>Asignación Actual</th><th>Estado</th></tr></thead>
      <tbody>${db.equipos.map(e => `<tr><td style="font-family:monospace;font-weight:bold">${e.serie}</td><td>${e.marca} ${e.modelo}</td><td>${e.banda}</td><td>${e.cliente_id ? getCliente(e.cliente_id).nombre : 'Stock Central'}</td><td><span class="badge badge-green">${e.estado}</span></td></tr>`).join('')}</tbody></table>`;
  } else if (viewID === 'tecnicos') {
    $('page-title').textContent = 'Personal de Terreno';
    $('content').innerHTML = `
      <table class="data-table"><thead><tr><th>Nombre Técnico</th><th>RUT</th><th>Especialidad / Cargo</th></tr></thead>
      <tbody>${db.tecnicos.map(t => `<tr><td style="font-weight:500">${t.nombre}</td><td>${t.rut}</td><td>${t.cargo}</td></tr>`).join('')}</tbody></table>`;
  } else if (viewID === 'notas') {
    $('page-title').textContent = 'Órdenes de Trabajo';
    $('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="renderFormNota()"><i class="ti ti-plus"></i> Generar OT</button>`;
    renderListaNotas();
  } else if (viewID === 'visitas') {
    $('page-title').textContent = 'Informes de Visitas a Terreno';
    $('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="renderFormVisita()"><i class="ti ti-plus"></i> Nuevo Informe</button>`;
    renderListaVisitas();
  }
}

// Lógica de Órdenes de Trabajo (OT)
function renderListaNotas() {
  $('content').innerHTML = `
    <div class="cards-grid">${db.notas.map(n => `
      <div style="background:var(--bg2);padding:16px;border-radius:var(--radius);color:white">
        <div style="display:flex;justify-content:between;margin-bottom:6px;font-size:11px;color:var(--text3)"><span>OT #${n.id}</span></div>
        <h3 style="margin-bottom:4px">${getCliente(n.cliente_id).nombre}</h3>
        <p style="font-size:12px;color:var(--text3);margin-bottom:8px"><i class="ti ti-map-pin"></i> ${getInstalacion(n.instalacion_id).nombre}</p>
        <p style="background:var(--bg);color:var(--text);padding:10px;border-radius:6px;font-size:13px">${n.detalle}</p>
        <div style="margin-top:10px;font-size:12px">Téc: <strong>${getTecnico(n.tecnico_id).nombre}</strong></div>
      </div>`).join('') || '<p>No hay Órdenes de Trabajo ingresadas.</p>'}</div>`;
}

function renderFormNota() {
  $('content').innerHTML = `
    <div class="form-grid" style="max-width:700px;background:var(--bg2);padding:20px;border-radius:var(--radius);color:white">
      <div class="field"><label>Cliente</label><select id="ot-cliente">${db.clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}</select></div>
      <div class="field"><label>Instalación / Obra</label><select id="ot-instalacion">${db.instalaciones.map(i=>`<option value="${i.id}">${i.nombre}</option>`).join('')}</select></div>
      <div class="field" style="grid-column:1/-1"><label>Técnico Encargado</label><select id="ot-tecnico">${db.tecnicos.map(t=>`<option value="${t.id}">${t.nombre}</option>`).join('')}</select></div>
      <div class="field" style="grid-column:1/-1"><label>Detalle Técnico del Trabajo</label><textarea id="ot-detalle" placeholder="Describa el trabajo realizado..."></textarea></div>
      <div class="field" style="grid-column:1/-1"><label>Firma Digital Conforme</label><div class="signature-area"><canvas id="sig-ot"></canvas></div></div>
      <div style="grid-column:1/-1;margin-top:10px"><button class="btn btn-primary" onclick="guardarOT()">Guardar y Sincronizar OT</button></div>
    </div>`;
  initCanvas('sig-ot');
}

async function guardarOT() {
  const d = $('ot-detalle').value.trim();
  if(!d) return alert("Por favor complete el campo de detalle.");
  const payload = {
    cliente_id: parseInt($('ot-cliente').value),
    instalacion_id: parseInt($('ot-instalacion').value),
    tecnico_id: parseInt($('ot-tecnico').value),
    detalle: d,
    firma_cliente: canvasObj ? canvasObj.toDataURL() : null
  };
  const { error } = await supabase.from('ordenes_trabajo').insert([payload]);
  if(error) alert("Error Supabase: " + error.message);
  else { alert("OT Guardada exitosamente."); loadDB(); }
}

// Lógica de Informes de Terreno (Visitas)
function renderListaVisitas() {
  $('content').innerHTML = `
    <div class="cards-grid">${db.visitas.map(v => `
      <div style="background:var(--bg2);padding:16px;border-radius:var(--radius);color:white">
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Informe Visita #${v.id} · Motivo: ${v.motivo || 'Revisión'}</div>
        <h3 style="margin-bottom:4px">${getCliente(v.cliente_id).nombre}</h3>
        <p style="background:var(--bg);color:var(--text);padding:10px;border-radius:6px;font-size:13px;margin-top:6px">${v.observaciones || v.detalle || 'Sin observaciones'}</p>
        <div style="margin-top:10px;font-size:12px">Estatus Técnico: <strong>${v.estado_visita || 'Completado'}</strong></div>
      </div>`).join('') || '<p>No hay Informes de Visita en Terreno registrados.</p>'}</div>`;
}

function renderFormVisita() {
  $('content').innerHTML = `
    <div class="form-grid" style="max-width:700px;background:var(--bg2);padding:20px;border-radius:var(--radius);color:white">
      <div class="field"><label>Cliente Visitado</label><select id="v-cliente">${db.clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}</select></div>
      <div class="field"><label>Motivo Técnico de Visita</label><input type="text" id="v-motivo" placeholder="Ej: Falla repetidora / Factibilidad técnica"></div>
      <div class="field" style="grid-column:1/-1"><label>Observaciones y Conclusiones en Terreno</label><textarea id="v-obs" placeholder="Describa el diagnóstico visual, mediciones RSSI, estado de fuentes o antenas..."></textarea></div>
      <div style="grid-column:1/-1;margin-top:10px"><button class="btn btn-primary" onclick="guardarVisita()">Registrar Informe de Terreno</button></div>
    </div>`;
}

async function guardarVisita() {
  const obs = $('v-obs').value.trim();
  if(!obs) return alert("Por favor añada las observaciones de la visita.");
  const payload = {
    cliente_id: parseInt($('v-cliente').value),
    motivo: $('v-motivo').value || 'Inspección Técnica',
    observaciones: obs,
    fecha: new Date().toISOString()
  };
  const { error } = await supabase.from('informes_terreno').insert([payload]);
  if(error) alert("Error Supabase: " + error.message);
  else { alert("Informe de Terreno guardado exitosamente."); loadDB(); }
}

// Inicializador de Firmas Reutilizable
let canvasObj, ctxObj, drawingObj = false;
function initCanvas(id) {
  canvasObj = $(id); if(!canvasObj) return;
  ctxObj = canvasObj.getContext('2d');
  canvasObj.width = canvasObj.parentElement.offsetWidth; canvasObj.height = 120;
  ctxObj.strokeStyle = '#222'; ctxObj.lineWidth = 2;

  const getP = e => {
    const r = canvasObj.getBoundingClientRect();
    return { x: (e.touches ? e.touches[0].clientX : e.clientX) - r.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - r.top };
  };
  canvasObj.addEventListener('mousedown', e => { drawingObj = true; const p = getP(e); ctxObj.beginPath(); ctxObj.moveTo(p.x, p.y); });
  canvasObj.addEventListener('mousemove', e => { if(!drawingObj) return; e.preventDefault(); const p = getP(e); ctxObj.lineTo(p.x, p.y); ctxObj.stroke(); });
  window.addEventListener('mouseup', () => drawingObj = false);
}
</script>
</body>
</html>
