<!DOCTYPE html>
<html lang="es">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gotas Comunicación SPA — Plataforma de Gestión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #73756c; 
      --text: #1a1916; 
      --text2: #ffffff; 
      --text3: #d4d2cc;
      --border: #e8e6e0;
      --border2: #73756c; 
      --info: #f19726; 
      --danger: #A32D2D;
      --radius: 8px;
      --radius-sm: 5px; 
      --mono: 'Courier New', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e; 
        --bg2: #2a2b27; 
        --text: #f5f5f0; 
        --text2: #b2b5c0; 
        --text3: #6b6a66;
        --border: #3a3a3c; 
        --border2: #48484a; 
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      font-size: 14px;
      color: var(--text); 
      background: var(--bg); 
    }
    #app { display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 220px; background: var(--bg2); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar .brand { padding: 14px 16px; border-bottom: 0.5px solid var(--border); }
    #sidebar .brand .logo { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; color: var(--text); }
    #sidebar .brand .logo i { font-size: 18px; color: var(--info); }
    #sidebar .brand .sub { font-size: 10px; color: var(--text2); margin-top: 3px; }
    #sidebar nav { flex: 1; padding: 8px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13px; margin-bottom: 2px; border: 0.5px solid transparent; text-decoration: none; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.1) !important; color: var(--info) !important; }
    .nav-item.active { background: rgba(255, 255, 255, 0.15) !important; color: #ffffff !important; border-color: var(--info) !important; }
    .nav-item i { font-size: 16px; }
    .nav-section { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 12px 12px 4px; }
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar { padding: 12px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; background: var(--bg); }
    #topbar h1 { font-size: 16px; font-weight: 500; }
    #topbar .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { text-align: left; padding: 8px 12px; font-weight: 500; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
    .data-table td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg2); }
    .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .badge-green { background: #EAF3DE; color: #3B6D11; }
    .badge-amber { background: #FAEEDA; color: #854F0B; }
    .badge-blue { background: #E6F1FB; color: #185FA5; }
    .badge-red { background: #FCEBEB; color: #A32D2D; }
    .badge-gray { background: #F1EFE8; color: #5F5E5A; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .field input, .field select, .field textarea { border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 13px; background: var(--bg); color: var(--text); width: 100%; }
    .field textarea { resize: vertical; min-height: 60px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; border: 0.5px solid var(--border); }
    .stat-card .lbl { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
    .stat-card .val { font-size: 22px; font-weight: 500; }
    .stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 24px; width: 600px; max-width: 95vw; max-height: 88vh; overflow-y: auto; }
    .modal h2 { font-size: 15px; font-weight: 500; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 0.5px solid var(--border); }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); }
    .btn:hover { background: var(--bg2); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-primary:hover { opacity: 0.85; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .search-box, .filter-select { border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 13px; background: var(--bg); color: var(--text); position: relative; z-index: 10; }
    .search-box { width: 220px; }
    .pager { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 13px; color: var(--text2); }
    
    /* OT OFICIAL */
    .ot-wrap { background: white; color: #111; font-family: Arial, sans-serif; font-size: 11px; border: 1px solid #ccc; border-radius: 6px; overflow: hidden; max-width: 780px; margin: 0 auto; }
    .ot-header { background: #1a3a6b; color: white; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
    .ot-header .empresa { font-size: 14px; font-weight: 700; }
    .ot-header .sub { font-size: 10px; opacity: 0.85; margin-top: 2px; }
    .ot-header .num-orden { text-align: right; }
    .ot-header .num-orden .label { font-size: 10px; opacity: 0.8; }
    .ot-header .num-orden .num { font-size: 20px; font-weight: 700; }
    .ot-tipos { display: flex; gap: 12px; padding: 6px 14px; border-bottom: 1px solid #ddd; background: #f5f7fa; font-size: 10px; }
    .ot-tipo-box { display: flex; align-items: center; gap: 5px; }
    .ot-tipo-box .check { width: 13px; height: 13px; border: 1px solid #666; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #1a3a6b; }
    .ot-info { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #ddd; }
    .ot-info-col { padding: 8px 14px; }
    .ot-info-col:first-child { border-right: 1px solid #ddd; }
    .ot-kv { display: flex; align-items: baseline; gap: 4px; margin-bottom: 4px; font-size: 11px; }
    .ot-kv .k { color: #555; white-space: nowrap; }
    .ot-kv .v { font-weight: 600; border-bottom: 1px solid #aaa; flex: 1; min-height: 15px; color: #111; }
    .ot-table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .ot-table th { background: #1a3a6b; color: white; padding: 5px 7px; text-align: left; font-weight: 600; border: 1px solid #1a3a6b; }
    .ot-table td { padding: 4px 7px; border: 1px solid #ddd; min-height: 18px; color: #111; }
    .ot-table tr:nth-child(even) td { background: #f9f9f9; }
    .ot-obs { padding: 7px 14px; border-top: 1px solid #ddd; }

    .ot-footer-col { padding: 8px 14px; }

    .ot-footer-col .title { font-weight: 700; font-size: 10px; text-transform: uppercase; color: #1a3a6b; margin-bottom: 5px; border-bottom: 1px solid #1a3a6b; padding-bottom: 2px; }

<div id="app">

  </div>

    <div id="topbar"><h1 id="page-title">Dashboard</h1><div class="actions" id="topbar-actions"></div></div>
    <div id="content"></div>
  </div>
  <div id="modal-container"></div>
</div>

<script>
// Conexión Oficial a Supabase
const SUPABASE_URL = 'https://nberpv3jj7gk01fyugol.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nBERPv3jJ7GK01fyUgOlPg_iC5SSXQJ';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Memoria centralizada de la Plataforma
let db = { clientes: [], instalaciones: [], tecnicos: [], equipos: [], notas: [] };
let instPage = 1;
const CPP = 25;
const $ = id => document.getElementById(id);

// Métodos de Cruce y Consulta Rápida
function getCliente(id){ return db.clientes.find(c => c.id === parseInt(id)) || {}; }
function getInstalacion(id){ return db.instalaciones.find(i => i.id === parseInt(id)) || {}; }
function getTecnico(id){ return db.tecnicos.find(t => t.id === parseInt(id)) || {}; }

// Sincronización e Inicio desde la Nube
async function loadDB() {
  try {
    const [resClientes, resInstalaciones, resTecnicos, resEquipos, resNotas] = await Promise.all([
      supabase.from('clientes').select('*').order('nombre'),
      supabase.from('instalaciones').select('*').order('nombre'),
      supabase.from('tecnicos').select('*').order('nombre'),
      supabase.from('equipos').select('*').order('id'),
      supabase.from('ordenes_trabajo').select('*').order('id', { ascending: false })
    ]);

    db.clientes = resClientes.data || [];
    db.instalaciones = resInstalaciones.data || [];
    db.tecnicos = resTecnicos.data || [];
    db.equipos = resEquipos.data || [];
    db.notas = resNotas.data || [];

    const vistaActiva = document.querySelector('.nav-item.active')?.getAttribute('data-view') || 'dashboard';
    showView(vistaActiva);
  } catch (error) {
    console.error("Error sincronizando con Supabase:", error);
  }
}

window.addEventListener('DOMContentLoaded', loadDB);

// Cambiar de Vistas del Panel Izquierdo
function showView(viewID) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const activeNav = document.querySelector(`.nav-item[data-view="${viewID}"]`);
  if (activeNav) activeNav.classList.add('active');

  $('topbar-actions').innerHTML = '';

  if (viewID === 'dashboard') {
    $('page-title').textContent = 'Dashboard Gotas';
    $('content').innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="lbl">Clientes Activos</div><div class="val">${db.clientes.length}</div></div>
        <div class="stat-card"><div class="lbl">Puntos de Instalación</div><div class="val">${db.instalaciones.length}</div></div>
        <div class="stat-card"><div class="lbl">Stock Equipos Radio</div><div class="val">${db.equipos.length}</div></div>
        <div class="stat-card"><div class="lbl">OTs Emitidas</div><div class="val">${db.notas.length}</div></div>
      </div>
    `;
  } else if (viewID === 'clientes') {
    $('page-title').textContent = 'Módulo Clientes';
    renderClientes();
  } else if (viewID === 'instalaciones') {
    $('page-title').textContent = 'Zonas e Instalaciones';
    renderInstalaciones();
  } else if (viewID === 'equipos') {
    $('page-title').textContent = 'Inventario de Equipos RF';
    renderEquipos();
  } else if (viewID === 'tecnicos') {
    $('page-title').textContent = 'Equipo Técnico';
    renderTecnicos();
  } else if (viewID === 'notas') {
    $('page-title').textContent = 'Historial Órdenes de Trabajo';
    renderNotas();
  } else if (viewID === 'nueva-nota') {
    $('page-title').textContent = 'Generar Orden de Trabajo Digital';
    renderFormNota();
  }
}

// Renderizados de Módulos Específicos
function renderClientes() {
  $('content').innerHTML = `
    <table class="data-table"><thead><tr><th>ID</th><th>Nombre Cliente</th><th>RUT</th><th>Contacto</th></tr></thead>
    <tbody>${db.clientes.map(c => `<tr><td>#${c.id}</td><td style="font-weight:600">${c.nombre}</td><td>${c.rut || '—'}</td><td>${c.email || '—'}</td></tr>`).join('')}</tbody></table>`;
}

function renderInstalaciones() {
  const q = $('si') ? $('si').value : '';
  $('topbar-actions').innerHTML = `<input class="search-box" id="si" placeholder="Buscar instalación..." oninput="renderInstalaciones()">`;
  
  const lista = db.instalaciones.filter(i => i.nombre.toLowerCase().includes(q.toLowerCase()));
  $('content').innerHTML = `
    <table class="data-table"><thead><tr><th>Nombre Lugar</th><th>Cliente Propietario</th><th>Ciudad</th></tr></thead>
    <tbody>${lista.map(i => {
      const cl = getCliente(i.cliente_id);
      return `<tr><td style="font-weight:500">${i.nombre}</td><td><span class="badge badge-blue">${cl.nombre || '—'}</span></td><td>${i.ciudad || '—'}</td></tr>`;

function renderEquipos() {
  $('content').innerHTML = `
    <table class="data-table"><thead><tr><th>Nº Serie</th><th>Marca/Modelo</th><th>Banda</th><th>Asignación</th><th>Estado</th></tr></thead>
    <tbody>${db.equipos.map(e => {
      const cl = getCliente(e.cliente_id);
      return `<tr><td style="font-family:monospace;font-weight:bold">${e.serie}</td><td>${e.marca} ${e.modelo}</td><td>${e.banda}</td><td>${cl.nombre ? `<span class="badge badge-blue">${cl.nombre}</span>` : 'En Stock'}</td><td><span class="badge badge-green">${e.estado}</span></td></tr>`;

function renderTecnicos() {

          <span style="font-size:11px;color:var(--text3)">OT #${n.id} · ${new Date(n.fecha).toLocaleDateString('es-CL')}</span>
          <span class="badge badge-green">Nube</span>

        <p style="background:var(--bg);padding:10px;border-radius:6px;font-size:13px;min-height:50px">${n.detalle}</p>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:8px;border-top:0.5px solid var(--border)">

          ${n.firma_cliente ? `<img src="${n.firma_cliente}" style="height:32px;background:#fff;border-radius:4px;padding:2px">` : '<span style="color:var(--danger)">Sin Firma</span>'}

function renderFormNota() {
  $('content').innerHTML = `
    <div class="form-grid" style="max-width:700px;background:var(--bg2);padding:20px;border-radius:var(--radius)">
      <div class="field"><label>Seleccionar Cliente</label><select id="ot-cliente">${db.clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}</select></div>
      <div class="field"><label>Seleccionar Instalación/Obra</label><select id="ot-instalacion">${db.instalaciones.map(i=>`<option value="${i.id}">${i.nombre}</option>`).join('')}</select></div>
      <div class="field"><label>Técnico Responsable</label><select id="ot-tecnico">${db.tecnicos.map(t=>`<option value="${t.id}">${t.nombre}</option>`).join('')}</select></div>
      <div class="field" style="grid-column:1/-1"><label>Detalle de los Trabajos / Radios Intervenidas</label><textarea id="ot-detalle" placeholder="Ej: Mantención preventiva a 5 radios Hytera BP566, ajuste de etapa LNA e inductores de aire. Pruebas TX/RX conformes."></textarea></div>
      <div class="field" style="grid-column:1/-1"><label>Firma conforme del Cliente (En pantalla)</label>
        <div class="signature-area"><canvas id="signature-pad"></canvas></div>
        <button class="btn btn-sm" onclick="clearCanvas()" style="margin-top:5px;align-self:flex-start">Limpiar Firma</button>
      </div>
      <div style="grid-column:1/-1;margin-top:10px"><button class="btn btn-primary" onclick="guardarOTNube()">Sincronizar y Enviar OT</button></div>

// Control del Panel de Firma Digital
let canvas, ctx, drawing = false;
function initSignature() {
  canvas = $('signature-pad');
  if(!canvas) return;
  ctx = canvas.getContext('2d');
  
  canvas.width = canvas.parentElement.offsetWidth;
  canvas.height = 120;
  ctx.strokeStyle = '#111111';
  ctx.lineWidth = 2;

  const getPos = e => {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
      y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
    };
  };

  const start = e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
  const move = e => { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
  const stop = () => drawing = false;

  canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
  canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move); window.addEventListener('touchend', stop);
}

function clearCanvas() { if(ctx && canvas) ctx.clearRect(0, 0, canvas.width, canvas.height); }

// Envío Directo del Terreno a Supabase
async function guardarOTNube() {
  const detalleText = $('ot-detalle').value.trim();
  if(!detalleText) return alert("Por favor escribe el detalle de la orden de trabajo.");

  try {
    const nuevaOT = {
      cliente_id: parseInt($('ot-cliente').value),
      instalacion_id: parseInt($('ot-instalacion').value),
      tecnico_id: parseInt($('ot-tecnico').value),
      detalle: detalleText,
      firma_cliente: canvas.toDataURL(),
      firmado: true
    };

    const { error } = await supabase.from('ordenes_trabajo').insert([nuevaOT]);
    if (error) throw error;

    alert("¡Orden de Trabajo guardada e integrada en la nube de Gotas SPA!");
    await loadDB();
  } catch (err) {
    alert("Error de sincronización: " + err.message);
  }
}
</script>
