<!DOCTYPE html>
<html lang="es">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gotas Comunicación SPA — Plataforma de Gestión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #73756c; 
      --text: #1a1916; 
      --text2: #ffffff; 
      --text3: #d4d2cc;
      --border: #e8e6e0;
      --border2: #73756c; 
      --info: #f19726; 
      --danger: #A32D2D;
      --radius: 8px;
      --radius-sm: 5px; 
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e; 
        --bg2: #2a2b27; 
        --text: #f5f5f0; 
        --text2: #b2b5c0; 
        --text3: #6b6a66;
        --border: #3a3a3c; 
        --border2: #48484a; 
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      font-size: 14px;
      color: var(--text); 
      background: var(--bg); 
    }
    #app { display: flex; height: 100vh; overflow: hidden; }
    #sidebar { width: 220px; background: var(--bg2); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar .brand { padding: 14px 16px; border-bottom: 0.5px solid var(--border); }
    #sidebar .brand .logo { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; color: #ffffff; }
    #sidebar .brand .logo i { font-size: 18px; color: var(--info); }
    #sidebar .brand .sub { font-size: 10px; color: var(--text3); margin-top: 3px; }
    #sidebar nav { flex: 1; padding: 8px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13px; margin-bottom: 2px; border: 0.5px solid transparent; text-decoration: none; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.1) !important; color: var(--info) !important; }
    .nav-item.active { background: rgba(255, 255, 255, 0.15) !important; color: #ffffff !important; border-color: var(--info) !important; }
    .nav-item i { font-size: 16px; }
    .nav-section { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 12px 12px 4px; }
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar { padding: 12px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; background: var(--bg); }
    #topbar h1 { font-size: 16px; font-weight: 500; }
    #topbar .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { text-align: left; padding: 8px 12px; font-weight: 500; font-size: 11px; color: var(--text2); background: var(--bg2); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
    .data-table td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
    .data-table tr:hover td { background: rgba(0,0,0,0.02); }
    .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .badge-green { background: #EAF3DE; color: #3B6D11; }
    .badge-blue { background: #E6F1FB; color: #185FA5; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; color: var(--text); font-weight: 500; }
    .field input, .field select, .field textarea { border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 13px; background: var(--bg); color: var(--text); width: 100%; }
    .field textarea { resize: vertical; min-height: 70px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--bg2); color: white; border-radius: var(--radius); padding: 14px 16px; border: 0.5px solid var(--border); }
    .stat-card .lbl { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
    .stat-card .val { font-size: 22px; font-weight: 500; }
    .signature-area { border: 1px dashed var(--border2); background: #fff; border-radius: var(--radius-sm); margin-top: 6px; }
    .signature-area canvas { display: block; width: 100%; height: 120px; cursor: crosshair; }
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 768px) { .cards-grid { grid-template-columns: 1fr; } .stats-row { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div class="logo"><i class="ti ti-radio"></i><span>Gotas Com.</span></div>
      <div class="sub">Comunicación SPA</div>
    </div>
    <nav>
      <div class="nav-section">Principal</div>
      <div class="nav-item active" data-view="dashboard" onclick="showView('dashboard')"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></div>
      <div class="nav-section">Datos</div>
      <div class="nav-item" data-view="clientes" onclick="showView('clientes')"><i class="ti ti-building"></i><span>Clientes</span></div>
      <div class="nav-item" data-view="instalaciones" onclick="showView('instalaciones')"><i class="ti ti-map-pin"></i><span>Instalaciones</span></div>
      <div class="nav-item" data-view="equipos" onclick="showView('equipos')"><i class="ti ti-device-walkie-talkie"></i><span>Equipos</span></div>
      <div class="nav-item" data-view="tecnicos" onclick="showView('tecnicos')"><i class="ti ti-users"></i><span>Técnicos</span></div>
      <div class="nav-section">Operaciones</div>
      <div class="nav-item" data-view="notas" onclick="showView('notas')"><i class="ti ti-file-text"></i><span>Órdenes de Trabajo</span></div>
      <div class="nav-item" data-view="visitas" onclick="showView('visitas')"><i class="ti ti-file-certificate"></i><span>Informes de Terreno</span></div>
    </nav>
  </div>
  <div id="main">
    <div id="topbar"><h1 id="page-title">Dashboard</h1><div class="actions" id="topbar-actions"></div></div>
    <div id="content"></div>
  </div>
</div>

<script>
// Configuración de Supabase
const SUPABASE_URL = 'https://nberpv3jj7gk01fyugol.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nBERPv3jJ7GK01fyUgOlPg_iC5SSXQJ';
let supabase = null;

try {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {
  console.error("No se pudo conectar con la librería cliente de Supabase", e);
}

// Repositorio de datos locales (Fallback inmediato ante fallas de red o base de datos)
let db = {
  clientes: [
    { id: 1, nombre: "AD Rooms Ltda", rut: "76.432.112-K", email: "contacto@adrooms.cl" },
    { id: 2, nombre: "Anvic Ltda", rut: "77.543.210-4", email: "operaciones@anvic.cl" },
    { id: 3, nombre: "Construmart SA", rut: "81.990.200-3", email: "logistica@construmart.cl" }
  ],
  instalaciones: [
    { id: 1, cliente_id: 1, nombre: "Mall Vivo Coquimbo", ciudad: "Coquimbo" },
    { id: 2, cliente_id: 2, nombre: "Estadio Monumental", ciudad: "Macul" },
    { id: 3, cliente_id: 3, nombre: "CM13 Las Rejas", ciudad: "Estación Central" }
  ],
  tecnicos: [
    { id: 1, nombre: "Brandon Sanhueza", rut: "19.730.892-3", cargo: "Jefe Servicio Técnico", email: "brandon@gotascomunicaciones.com" },
    { id: 2, nombre: "Luis Miguel Méndez", rut: "26.779.101-5", cargo: "Técnico", email: "luis@gotascomunicaciones.com" },
    { id: 3, nombre: "Eduardo Fritz", rut: "20.499.434-K", cargo: "Técnico", email: "eduardo@gotascomunicaciones.com" }
  ],
  equipos: [
    { id: 1, serie: "25n20a1984", marca: "Hytera", modelo: "BP566 U2", banda: "UHF", cliente_id: 1, estado: "Disponible" },
    { id: 2, serie: "25n20a1890", marca: "Hytera", modelo: "BP566 U2", banda: "UHF", cliente_id: 2, estado: "Disponible" },
    { id: 3, serie: "21927a0158", marca: "Hytera", modelo: "PD486 VHF", banda: "VHF", cliente_id: null, estado: "Disponible" }
  ],
  notas: [],
  visitas: []
};

const $ = id => document.getElementById(id);
const getCliente = id => db.clientes.find(c => c.id == id) || { nombre: 'Sin Asignar' };
const getInstalacion = id => db.instalaciones.find(i => i.id == id) || { nombre: 'Instalación General' };
const getTecnico = id => db.tecnicos.find(t => t.id == id) || { nombre: 'Sin Técnico' };

// Carga Asíncrona robusta tolerante a errores individuales de tabla
async function loadDB() {
  if (supabase) {
    try {
      const rClientes = await supabase.from('clientes').select('*').order('nombre');
      if(rClientes.data && rClientes.data.length) db.clientes = rClientes.data;
    } catch(e) { console.warn("Error cargando clientes de la nube:", e); }

    try {
      const rInstalaciones = await supabase.from('instalaciones').select('*').order('nombre');
      if(rInstalaciones.data && rInstalaciones.data.length) db.instalaciones = rInstalaciones.data;
    } catch(e) { console.warn("Error cargando instalaciones de la nube:", e); }

    try {
      const rTecnicos = await supabase.from('tecnicos').select('*').order('nombre');
      if(rTecnicos.data && rTecnicos.data.length) db.tecnicos = rTecnicos.data;
    } catch(e) { console.warn("Error cargando tecnicos de la nube:", e); }

    try {
      const rEquipos = await supabase.from('equipos').select('*').order('id');
      if(rEquipos.data && rEquipos.data.length) db.equipos = rEquipos.data;
    } catch(e) { console.warn("Error cargando equipos de la nube:", e); }

    try {
      const rNotas = await supabase.from('ordenes_trabajo').select('*').order('id', { ascending: false });
      db.notas = rNotas.data || [];
    } catch(e) { console.warn("Error cargando OTs de la nube:", e); }

    try {
      const rVisitas = await supabase.from('informes_terreno').select('*').order('id', { ascending: false });
      db.visitas = rVisitas.data || [];
    } catch(e) { console.warn("Error cargando informes de terreno de la nube:", e); }
  }
  
  // Renderizar la vista principal pase lo que pase en la red
  showView('dashboard');
}

window.addEventListener('DOMContentLoaded', loadDB);

// Enrutador de Interfaz (Renderizado Seguro)
function showView(viewID) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  const activeNav = document.querySelector(`.nav-item[data-view="${viewID}"]`);
  if (activeNav) activeNav.classList.add('active');

  const actions = $('topbar-actions');
  const content = $('content');
  if(actions) actions.innerHTML = '';
  if(!content) return;

  if (viewID === 'dashboard') {
    $('page-title').textContent = 'Dashboard Gotas';
    content.innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="lbl">Clientes Activos</div><div class="val">${db.clientes.length}</div></div>
        <div class="stat-card"><div class="lbl">Puntos de Instalación</div><div class="val">${db.instalaciones.length}</div></div>
        <div class="stat-card"><div class="lbl">Equipos RF</div><div class="val">${db.equipos.length}</div></div>
        <div class="stat-card"><div class="lbl">Órdenes / Informes</div><div class="val">${db.notas.length + db.visitas.length}</div></div>
      </div>
    `;
  } else if (viewID === 'clientes') {
    $('page-title').textContent = 'Módulo Clientes';
    content.innerHTML = `
      <table class="data-table"><thead><tr><th>ID</th><th>Cliente / Empresa</th><th>RUT</th><th>Contacto</th></tr></thead>
      <tbody>${db.clientes.map(c => `<tr><td>#${c.id}</td><td style="font-weight:600">${c.nombre}</td><td>${c.rut || '—'}</td><td>${c.email || '—'}</td></tr>`).join('')}</tbody></table>`;
  } else if (viewID === 'instalaciones') {
    $('page-title').textContent = 'Zonas de Operación e Instalaciones';
    content.innerHTML = `
      <table class="data-table"><thead><tr><th>Lugar / Obra / Faena</th><th>Cliente Mandante</th><th>Ubicación</th></tr></thead>
      <tbody>${db.instalaciones.map(i => `<tr><td style="font-weight:500">${i.nombre}</td><td><span class="badge badge-blue">${getCliente(i.cliente_id).nombre}</span></td><td>${i.ciudad || '—'}</td></tr>`).join('')}</tbody></table>`;
  } else if (viewID === 'equipos') {
    $('page-title').textContent = 'Inventario Físico de Radios';
    content.innerHTML = `
      <table class="data-table"><thead><tr><th>Número Serie</th><th>Equipo</th><th>Banda</th><th>Asignado a</th><th>Estado</th></tr></thead>
      <tbody>${db.equipos.map(e => `<tr><td style="font-family:monospace;font-weight:bold">${e.serie}</td><td>${e.marca} ${e.modelo}</td><td>${e.banda}</td><td>${e.cliente_id ? getCliente(e.cliente_id).nombre : 'Stock Central'}</td><td><span class="badge badge-green">${e.estado || 'Disponible'}</span></td></tr>`).join('')}</tbody></table>`;
  } else if (viewID === 'tecnicos') {
    $('page-title').textContent = 'Personal de Servicio Técnico';
    content.innerHTML = `
      <table class="data-table"><thead><tr><th>Nombre Funcionario</th><th>RUT</th><th>Cargo / Especialidad</th></tr></thead>
      <tbody>${db.tecnicos.map(t => `<tr><td style="font-weight:500">${t.nombre}</td><td>${t.rut}</td><td>${t.cargo}</td></tr>`).join('')}</tbody></table>`;
  } else if (viewID === 'notas') {
    $('page-title').textContent = 'Historial de Órdenes de Trabajo';
    if(actions) actions.innerHTML = `<button class="btn btn-primary" onclick="renderFormNota()"><i class="ti ti-plus"></i> Generar Nueva OT</button>`;
    renderListaNotas();
  } else if (viewID === 'visitas') {
    $('page-title').textContent = 'Informes de Visita Técnica a Terreno';
    if(actions) actions.innerHTML = `<button class="btn btn-primary" onclick="renderFormVisita()"><i class="ti ti-plus"></i> Nuevo Informe</button>`;
    renderListaVisitas();
  }
}

// Sub-módulo: Órdenes de Trabajo (OT)
function renderListaNotas() {
  $('content').innerHTML = `
    <div class="cards-grid">${db.notas.map(n => `
      <div style="background:var(--bg2);padding:16px;border-radius:var(--radius);color:white">
        <span style="font-size:11px;color:var(--text3)">OT #${n.id}</span>
        <h3 style="margin-top:2px;margin-bottom:4px">${getCliente(n.cliente_id).nombre}</h3>
        <p style="font-size:12px;color:var(--text3);margin-bottom:8px"><i class="ti ti-map-pin"></i> ${getInstalacion(n.instalacion_id).nombre}</p>
        <p style="background:var(--bg);color:var(--text);padding:10px;border-radius:6px;font-size:13px">${n.detalle}</p>
        <div style="margin-top:10px;font-size:12px;display:flex;justify-content:space-between;align-items:center">
          <span>Responsable: <strong>${getTecnico(n.tecnico_id).nombre}</strong></span>
          ${n.firma_cliente ? `<span class="badge badge-green">Firmado Digitalmente</span>` : ''}
        </div>
      </div>`).join('') || '<p>No se registran Órdenes de Trabajo en el historial local ni en la nube.</p>'}</div>`;
}

function renderFormNota() {
  $('content').innerHTML = `
    <div class="form-grid" style="max-width:700px;background:var(--bg2);padding:20px;border-radius:var(--radius);color:white">
      <div class="field"><label>Seleccione el Cliente</label><select id="ot-cliente">${db.clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}</select></div>
      <div class="field"><label>Ubicación / Obra</label><select id="ot-instalacion">${db.instalaciones.map(i=>`<option value="${i.id}">${i.nombre}</option>`).join('')}</select></div>
      <div class="field" style="grid-column:1/-1"><label>Técnico a Cargo</label><select id="ot-tecnico">${db.tecnicos.map(t=>`<option value="${t.id}">${t.nombre}</option>`).join('')}</select></div>
      <div class="field" style="grid-column:1/-1"><label>Diagnóstico Técnico / Radios Reparadas</label><textarea id="ot-detalle" placeholder="Ej: Programación general de frecuencias, alineación de filtros y reemplazo de antena dañada..."></textarea></div>
      <div class="field" style="grid-column:1/-1"><label>Firma Electrónica Conforme del Cliente</label><div class="signature-area"><canvas id="sig-ot"></canvas></div></div>
      <div style="grid-column:1/-1;margin-top:10px"><button class="btn btn-primary" onclick="guardarOT()">Subir y Validar OT</button></div>
    </div>`;
  initCanvas('sig-ot');
}

async function guardarOT() {
  const detalle = $('ot-detalle').value.trim();
  if(!detalle) return alert("Describa el trabajo técnico realizado.");
  
  const data = {
    cliente_id: parseInt($('ot-cliente').value),
    instalacion_id: parseInt($('ot-instalacion').value),
    tecnico_id: parseInt($('ot-tecnico').value),
    detalle: detalle,
    firma_cliente: canvasObj ? canvasObj.toDataURL() : null
  };

  if (supabase) {
    const { error } = await supabase.from('ordenes_trabajo').insert([data]);
    if(error) console.error(error);
  }
  alert("Orden de Trabajo guardada de manera conforme.");
  loadDB();
}

// Sub-módulo: Informes de Terreno (Visitas de Inspección)
function renderListaVisitas() {
  $('content').innerHTML = `
    <div class="cards-grid">${db.visitas.map(v => `
      <div style="background:var(--bg2);padding:16px;border-radius:var(--radius);color:white">
        <span style="font-size:11px;color:var(--text3)">Informe Técnico #${v.id}</span>
        <h3 style="margin-top:2px;margin-bottom:4px">${getCliente(v.cliente_id).nombre}</h3>
        <p style="font-size:12px;color:var(--text3);margin-bottom:6px"><strong>Motivo:</strong> ${v.motivo || 'Evaluación Técnica'}</p>
        <p style="background:var(--bg);color:var(--text);padding:10px;border-radius:6px;font-size:13px">${v.observaciones || 'Sin detalles registrados.'}</p>
      </div>`).join('') || '<p>No se registran Informes de Terreno en el historial.</p>'}</div>`;
}

function renderFormVisita() {
  $('content').innerHTML = `
    <div class="form-grid" style="max-width:700px;background:var(--bg2);padding:20px;border-radius:var(--radius);color:white">
      <div class="field"><label>Empresa Solicitante</label><select id="v-cliente">${db.clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}</select></div>
      <div class="field"><label>Motivo Técnico de la Visita</label><input type="text" id="v-motivo" placeholder="Ej: Factibilidad de cobertura, revisión repetidora, etc."></div>
      <div class="field" style="grid-column:1/-1"><label>Observaciones de Campo, Mediciones e Informe Diagnóstico</label><textarea id="v-obs" placeholder="Describa el estado de las antenas, niveles de señal RSSI encontrados o estado de las fuentes de poder..."></textarea></div>
      <div style="grid-column:1/-1;margin-top:10px"><button class="btn btn-primary" onclick="guardarVisita()">Registrar Informe en Terreno</button></div>
    </div>`;
}

async function guardarVisita() {
  const obs = $('v-obs').value.trim();
  if(!obs) return alert("Por favor complete las observaciones técnicas detectadas en terreno.");

  const data = {
    cliente_id: parseInt($('v-cliente').value),
    motivo: $('v-motivo').value || 'Visita a Terreno',
    observaciones: obs,
    fecha: new Date().toISOString()
  };

  if (supabase) {
    const { error } = await supabase.from('informes_terreno').insert([data]);
    if(error) console.error(error);
  }
  alert("Informe de visita técnica registrado.");
  loadDB();
}

// Inicializador de Panel de Firmas Táctil/Mouse
let canvasObj, ctxObj, drawingObj = false;
function initCanvas(id) {
  canvasObj = $(id); if(!canvasObj) return;
  ctxObj = canvasObj.getContext('2d');
  canvasObj.width = canvasObj.parentElement.offsetWidth; canvasObj.height = 120;
  ctxObj.strokeStyle = '#222'; ctxObj.lineWidth = 2;

  const getP = e => {
    const r = canvasObj.getBoundingClientRect();
    return { x: (e.touches ? e.touches[0].clientX : e.clientX) - r.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - r.top };
  };
  canvasObj.addEventListener('mousedown', e => { drawingObj = true; const p = getP(e); ctxObj.beginPath(); ctxObj.moveTo(p.x, p.y); });
  canvasObj.addEventListener('mousemove', e => { if(!drawingObj) return; e.preventDefault(); const p = getP(e); ctxObj.lineTo(p.x, p.y); ctxObj.stroke(); });
  window.addEventListener('mouseup', () => drawingObj = false);
}
</script>
</body>
</html>
