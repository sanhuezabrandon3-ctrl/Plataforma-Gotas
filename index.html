<!DOCTYPE html>
<html lang="es">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gotas Comunicación SPA — Plataforma de Gestión</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg:#e3e4e8;--bg2:#73756c;--text:#1a1916;--text2:#000000;--text3:#d4d2cc;
    --border:#e8e6e0;--border2:#73756c;--info:#f19726;--danger:#A32D2D;
    --radius:8px;--radius-sm:5px;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#1c1c1e;--bg2:#2a2b27;--text:#f5f5f0;--text2:#b2b5c0;--text3:#6b6a66;--border:#3a3a3c;--border2:#48484a;}
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg);}
  #app{display:flex;height:100vh;overflow:hidden;}
  #sidebar{width:220px;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
  #sidebar .brand{padding:14px 16px;border-bottom:0.5px solid var(--border);}
  #sidebar .brand .logo{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;color:#fff;}
  #sidebar .brand .logo i{font-size:18px;color:var(--info);}
  #sidebar .brand .sub{font-size:10px;color:var(--text3);margin-top:3px;}
  #sidebar nav{flex:1;padding:8px;overflow-y:auto;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;margin-bottom:2px;border:0.5px solid transparent;}
  .nav-item:hover{background:rgba(255,255,255,0.1);color:var(--info);}
  .nav-item.active{background:rgba(255,255,255,0.15);color:#fff;border-color:var(--info);}
  .nav-item i{font-size:16px;}
  .nav-section{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:12px 12px 4px;}
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  #topbar{padding:12px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:var(--bg);}
  #topbar h1{font-size:16px;font-weight:500;}
  #topbar .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  #content{flex:1;overflow-y:auto;padding:20px;background:var(--bg);}
  .data-table{width:100%;border-collapse:collapse;font-size:13px;}
  .data-table th{text-align:left;padding:8px 12px;font-weight:500;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;border-bottom:0.5px solid var(--border);white-space:nowrap;}
  .data-table td{padding:9px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle;}
  .data-table tr:last-child td{border-bottom:none;}
  .data-table tr:hover td{background:rgba(0,0,0,0.03);}
  .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:500;}
  .badge-green{background:#EAF3DE;color:#3B6D11;}
  .badge-amber{background:#FAEEDA;color:#854F0B;}
  .badge-blue{background:#E6F1FB;color:#185FA5;}
  .badge-red{background:#FCEBEB;color:#A32D2D;}
  .badge-gray{background:#F1EFE8;color:#5F5E5A;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:12px;color:var(--text2);font-weight:500;}
  .field input,.field select,.field textarea{border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;background:var(--bg);color:var(--text);width:100%;}
  .field textarea{resize:vertical;min-height:60px;}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;border:0.5px solid var(--border);}
  .stat-card .lbl{font-size:11px;color:var(--text2);margin-bottom:6px;}
  .stat-card .val{font-size:22px;font-weight:500;color:#fff;}
  .stat-card .sub{font-size:11px;color:var(--text3);margin-top:3px;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;}
  .modal{background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);padding:24px;width:600px;max-width:95vw;max-height:88vh;overflow-y:auto;}
  .modal h2{font-size:15px;font-weight:500;margin-bottom:18px;padding-bottom:12px;border-bottom:0.5px solid var(--border);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);}
  .btn:hover{opacity:0.85;}
  .btn-primary{background:var(--info);color:#fff;border-color:var(--info);}
  .btn-sm{padding:4px 10px;font-size:12px;}
  .search-box,.filter-select{border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:6px 12px;font-size:13px;background:var(--bg);color:var(--text);}
  .search-box{width:220px;}
  .pager{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;color:var(--text2);}
  .toast{position:fixed;bottom:24px;right:24px;background:#1a1916;color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
  .toast.show{opacity:1;}
  .loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);gap:10px;font-size:14px;}
  .loading i{font-size:20px;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .ot-wrap{background:white;color:#111;font-family:Arial,sans-serif;font-size:11px;border:1px solid #ccc;border-radius:6px;overflow:hidden;max-width:780px;}
  .ot-header{background:#1a3a6b;color:white;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
  .ot-header .empresa{font-size:14px;font-weight:700;}
  .ot-header .sub{font-size:10px;opacity:0.85;margin-top:2px;}
  .ot-header .num-orden{text-align:right;}
  .ot-header .num-orden .label{font-size:10px;opacity:0.8;}
  .ot-header .num-orden .num{font-size:20px;font-weight:700;}
  .ot-tipos{display:flex;gap:12px;padding:6px 14px;border-bottom:1px solid #ddd;background:#f5f7fa;font-size:10px;}
  .ot-tipo-box{display:flex;align-items:center;gap:5px;}
  .ot-tipo-box .check{width:13px;height:13px;border:1px solid #666;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#1a3a6b;}
  .ot-info{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #ddd;}
  .ot-info-col{padding:8px 14px;}
  .ot-info-col:first-child{border-right:1px solid #ddd;}
  .ot-kv{display:flex;align-items:baseline;gap:4px;margin-bottom:4px;font-size:11px;}
  .ot-kv .k{color:#555;white-space:nowrap;}
  .ot-kv .v{font-weight:600;border-bottom:1px solid #aaa;flex:1;min-height:15px;}
  .ot-table{width:100%;border-collapse:collapse;font-size:10px;}
  .ot-table th{background:#1a3a6b;color:white;padding:5px 7px;text-align:left;font-weight:600;border:1px solid #1a3a6b;}
  .ot-table td{padding:4px 7px;border:1px solid #ddd;min-height:18px;}
  .ot-table tr:nth-child(even) td{background:#f9f9f9;}
  .ot-obs{padding:7px 14px;border-top:1px solid #ddd;}
  .ot-obs .label{font-weight:600;font-size:10px;color:#555;margin-bottom:3px;}
  .ot-obs .val{border:1px solid #ddd;min-height:38px;padding:4px;font-size:11px;border-radius:2px;background:#fafafa;}
  .ot-footer{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #ddd;}
  .ot-footer-col{padding:8px 14px;}
  .ot-footer-col:first-child{border-right:1px solid #ddd;}
  .ot-footer-col .title{font-weight:700;font-size:10px;text-transform:uppercase;color:#1a3a6b;margin-bottom:5px;border-bottom:1px solid #1a3a6b;padding-bottom:2px;}
  .ot-footer-kv{font-size:10px;margin-bottom:4px;display:flex;align-items:baseline;gap:4px;}
  .ot-footer-kv .k{color:#555;white-space:nowrap;}
  .ot-footer-kv .v{border-bottom:1px solid #aaa;flex:1;min-height:14px;font-weight:600;}
  .ot-bottom{background:#1a3a6b;color:white;padding:5px 14px;font-size:9px;text-align:center;}
  @media print{
    #sidebar,#topbar,.btn,.pager,.toast{display:none!important;}
    #main{display:block;}
    #content{padding:0;overflow:visible;}
    .ot-wrap{border:none;border-radius:0;max-width:100%;}
  }
  @media(max-width:640px){
    #sidebar{width:48px;}
    #sidebar .brand .logo span,#sidebar .brand .sub,.nav-item span,.nav-section{display:none;}
    .nav-item{justify-content:center;padding:10px;}
    .stats-row{grid-template-columns:1fr 1fr;}
    .form-grid{grid-template-columns:1fr;}
    .search-box{width:140px;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="brand">
      <div class="logo"><i class="ti ti-radio"></i><span>Gotas Com.</span></div>
      <div class="sub">Comunicación SPA</div>
    </div>
    <nav>
      <div class="nav-section">Principal</div>
      <div class="nav-item active" data-view="dashboard" onclick="showView('dashboard')"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></div>
      <div class="nav-section">Datos</div>
      <div class="nav-item" data-view="clientes" onclick="showView('clientes')"><i class="ti ti-building"></i><span>Clientes</span></div>
      <div class="nav-item" data-view="instalaciones" onclick="showView('instalaciones')"><i class="ti ti-map-pin"></i><span>Instalaciones</span></div>
      <div class="nav-item" data-view="equipos" onclick="showView('equipos')"><i class="ti ti-device-walkie-talkie"></i><span>Equipos</span></div>
      <div class="nav-item" data-view="tecnicos" onclick="showView('tecnicos')"><i class="ti ti-users"></i><span>Técnicos</span></div>
      <div class="nav-section">Operaciones</div>
      <div class="nav-item" data-view="notas" onclick="showView('notas')"><i class="ti ti-file-text"></i><span>Órdenes de Trabajo</span></div>
      <div class="nav-item" data-view="nueva-nota" onclick="showView('nueva-nota')"><i class="ti ti-file-plus"></i><span>Nueva OT</span></div>
      <div class="nav-item" data-view="informes" onclick="showView('informes')"><i class="ti ti-clipboard-list"></i><span>Informes de Visita</span></div>
      <div class="nav-item" data-view="nuevo-informe" onclick="showView('nuevo-informe')"><i class="ti ti-clipboard-plus"></i><span>Nuevo Informe</span></div>
    </nav>
  </div>
  <div id="main">
    <div id="topbar"><h1 id="page-title">Dashboard</h1><div class="actions" id="topbar-actions"></div></div>
    <div id="content"><div class="loading"><i class="ti ti-loader"></i> Conectando con Supabase...</div></div>
  </div>
  <div id="modal-container"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── SUPABASE: nombres distintos para evitar conflicto ─────────────
const SUPABASE_URL = 'https://tzboptemotfalyufgbaj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6Ym9wdGVtb3RmYWx5dWZnYmFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTI1NDAsImV4cCI6MjA5NzE4ODU0MH0.Br5rqKJeONj93f8UayTYiKETFoFpnr-q4Nx-lba3sFQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── ESTADO ────────────────────────────────────────────────────────
let clientes=[], instalaciones=[], tecnicos=[], equipos=[], ordenes=[], informes=[];
let clientePage=1, instPage=1;
const CPP=25;
const $=id=>document.getElementById(id);

function toast(msg,ok=true){
  const t=$('toast');
  t.textContent=msg;
  t.style.background=ok?'#2d6a4f':'#A32D2D';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function loading(msg='Cargando...'){
  $('content').innerHTML=`<div class="loading"><i class="ti ti-loader"></i> ${msg}</div>`;
}

// ─── CARGA INICIAL ─────────────────────────────────────────────────
async function iniciar(){
  try{
    const [rc,ri,rt,re,ro,rinf]=await Promise.all([
      sb.from('clientes').select('*').order('nombre'),
      sb.from('instalaciones').select('*').order('nombre'),
      sb.from('tecnicos').select('*').order('nombre'),
      sb.from('equipos').select('*').order('marca'),
      sb.from('ordenes').select('*').order('created_at',{ascending:false}),
      sb.from('informes').select('*').order('created_at',{ascending:false}),
    ]);
    if(rc.error) throw rc.error;
    clientes=rc.data||[];
    instalaciones=ri.data||[];
    tecnicos=rt.data||[];
    equipos=re.data||[];
    ordenes=ro.data||[];
    informes=rinf.data||[];
    showView('dashboard');
  }catch(e){
    console.error('Error Supabase:',e);
    $('content').innerHTML=`<div class="loading" style="color:red"><i class="ti ti-alert-circle"></i> Error al conectar: ${e.message||e}.<br><br><button class="btn btn-primary" onclick="iniciar()">Reintentar</button></div>`;
  }
}

async function recargarTodo(){
  loading('Actualizando...');
  await iniciar();
  toast('Datos actualizados ✓');
}

// ─── HELPERS ───────────────────────────────────────────────────────
const getCliente=id=>clientes.find(c=>c.id===id);
const getInstalacion=id=>instalaciones.find(i=>i.id===id);
const getTecnico=id=>tecnicos.find(t=>t.id===id);
const getEquipo=id=>equipos.find(e=>e.id===id);

function nextNumero(lista,prefijo){
  if(!lista.length) return `${prefijo}-0001`;
  const nums=lista.map(x=>parseInt((x.numero||'').replace(/\D/g,''))||0);
  return `${prefijo}-${String(Math.max(...nums)+1).padStart(4,'0')}`;
}

// ─── VISTAS ────────────────────────────────────────────────────────
function showView(view){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.querySelector(`[data-view="${view}"]`);
  if(nav) nav.classList.add('active');
  const titles={dashboard:'Dashboard',clientes:'Clientes',instalaciones:'Instalaciones',equipos:'Equipos',tecnicos:'Técnicos',notas:'Órdenes de Trabajo','nueva-nota':'Nueva Orden de Trabajo',informes:'Informes de Visita','nuevo-informe':'Nuevo Informe de Visita'};
  $('page-title').textContent=titles[view]||view;
  $('topbar-actions').innerHTML='';
  ({dashboard:renderDashboard,clientes:renderClientes,instalaciones:renderInstalaciones,equipos:renderEquipos,tecnicos:renderTecnicos,notas:renderNotas,'nueva-nota':renderNuevaNota,informes:renderInformes,'nuevo-informe':renderNuevoInforme})[view]?.();
}

function renderDashboard(){
  const rf=equipos.filter(e=>!['Batería','Cargador','Manos libres'].includes(e.tipo));
  const tipos={};rf.forEach(e=>{tipos[e.tipo]=(tipos[e.tipo]||0)+1;});
  $('content').innerHTML=`
    <div class="stats-row">
      <div class="stat-card"><div class="lbl">Clientes</div><div class="val">${clientes.length}</div></div>
      <div class="stat-card"><div class="lbl">Instalaciones</div><div class="val">${instalaciones.length}</div></div>
      <div class="stat-card"><div class="lbl">OT emitidas</div><div class="val">${ordenes.length}</div><div class="sub">${ordenes.filter(n=>n.firmado).length} firmadas</div></div>
      <div class="stat-card"><div class="lbl">Informes visita</div><div class="val">${informes.length}</div></div>
    </div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:500">Stock por tipo de equipo</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
      ${Object.entries(tipos).map(([t,c])=>`<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 16px"><div style="font-size:11px;color:var(--text3)">${t}</div><div style="font-size:20px;font-weight:500;color:#fff">${c}</div></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="showView('nueva-nota')"><i class="ti ti-file-plus"></i> Nueva OT</button>
      <button class="btn btn-primary" onclick="showView('nuevo-informe')" style="background:#2d6a4f;border-color:#2d6a4f"><i class="ti ti-clipboard-plus"></i> Nuevo Informe</button>
      <button class="btn" onclick="showView('notas')"><i class="ti ti-file-text"></i> Ver OTs</button>
      <button class="btn" onclick="showView('equipos')"><i class="ti ti-device-walkie-talkie"></i> Inventario</button>
      <button class="btn" onclick="recargarTodo()"><i class="ti ti-refresh"></i> Actualizar</button>
    </div>`;
}

function renderClientes(){
  const q=($('sc')||{}).value||'';
  $('topbar-actions').innerHTML=`<input class="search-box" id="sc" placeholder="Buscar cliente..." oninput="clientePage=1;renderClientes()" value="${q}"><button class="btn btn-primary" onclick="openModal('cliente')"><i class="ti ti-plus"></i> Agregar</button>`;
  const lista=clientes.filter(c=>c.nombre.toLowerCase().includes(q.toLowerCase()));
  const pages=Math.ceil(lista.length/CPP)||1;
  if(clientePage>pages) clientePage=pages;
  const slice=lista.slice((clientePage-1)*CPP,clientePage*CPP);
  $('content').innerHTML=`
    <table class="data-table"><thead><tr><th>#</th><th>Nombre</th><th>RUT</th><th>Contacto</th><th>Teléfono</th><th>Email</th><th></th></tr></thead>
    <tbody>${slice.map((c,i)=>`<tr>
      <td style="color:var(--text3);font-size:12px">${(clientePage-1)*CPP+i+1}</td>
      <td style="font-weight:500">${c.nombre}</td><td>${c.rut||'—'}</td>
      <td>${c.contacto||'—'}</td><td>${c.telefono||'—'}</td><td>${c.email||'—'}</td>
      <td><button class="btn btn-sm" onclick="openModal('cliente',${c.id})"><i class="ti ti-edit"></i></button>
          <button class="btn btn-sm" onclick="delRecord('clientes',${c.id})" style="color:var(--danger)"><i class="ti ti-trash"></i></button></td>
    </tr>`).join('')||'<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:32px">Sin resultados</td></tr>'}
    </tbody></table>
    <div class="pager">
      <button class="btn btn-sm" onclick="clientePage=Math.max(1,clientePage-1);renderClientes()" ${clientePage<=1?'disabled':''}>‹ Anterior</button>
      <span>Página ${clientePage} de ${pages} · ${lista.length} clientes</span>
      <button class="btn btn-sm" onclick="clientePage=Math.min(${pages},clientePage+1);renderClientes()" ${clientePage>=pages?'disabled':''}>Siguiente ›</button>
    </div>`;
  setTimeout(()=>{const el=$('sc');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},10);
}

function renderInstalaciones(){
  const q=($('si')||{}).value||'';
  $('topbar-actions').innerHTML=`<input class="search-box" id="si" placeholder="Buscar instalación..." oninput="instPage=1;renderInstalaciones()" value="${q}" style="width:200px"><button class="btn btn-primary" onclick="openModal('instalacion')"><i class="ti ti-plus"></i> Agregar</button>`;
  const lista=instalaciones.filter(i=>i.nombre.toLowerCase().includes(q.toLowerCase())||(getCliente(i.cliente_id)||{}).nombre?.toLowerCase().includes(q.toLowerCase()));
  const pages=Math.ceil(lista.length/CPP)||1;
  if(instPage>pages) instPage=pages;
  const slice=lista.slice((instPage-1)*CPP,instPage*CPP);
  $('content').innerHTML=`
    <table class="data-table"><thead><tr><th>Nombre</th><th>Cliente</th><th>Dirección</th><th>Ciudad</th><th></th></tr></thead>
    <tbody>${slice.map(i=>{const cl=getCliente(i.cliente_id);return`<tr>
      <td style="font-weight:500">${i.nombre}</td>
      <td><span class="badge badge-blue" style="font-size:11px">${cl?cl.nombre:'—'}</span></td>
      <td>${i.direccion||'—'}</td><td>${i.ciudad||'—'}</td>
      <td><button class="btn btn-sm" onclick="openModal('instalacion',${i.id})"><i class="ti ti-edit"></i></button>
          <button class="btn btn-sm" onclick="delRecord('instalaciones',${i.id})" style="color:var(--danger)"><i class="ti ti-trash"></i></button></td>
    </tr>`;}).join('')||'<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:32px">Sin instalaciones.</td></tr>'}
    </tbody></table>
    <div class="pager">
      <button class="btn btn-sm" onclick="instPage=Math.max(1,instPage-1);renderInstalaciones()" ${instPage<=1?'disabled':''}>‹ Anterior</button>
      <span>Página ${instPage} de ${pages} · ${lista.length} instalaciones</span>
      <button class="btn btn-sm" onclick="instPage=Math.min(${pages},instPage+1);renderInstalaciones()" ${instPage>=pages?'disabled':''}>Siguiente ›</button>
    </div>`;
  setTimeout(()=>{const el=$('si');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}},10);
}

function renderEquipos(){
  const q=($('se')||{}).value||'';

window.fillEq=function(i){
  const eq=equipos.find(e=>e.id===parseInt($('eq-sel-'+i).value));
  $('eq-mod-'+i).value=eq?eq.modelo:'';
  $('eq-ser-'+i).value=eq?eq.serie:'';
};

function initSig(){
  sigCanvas=$('sig');if(!sigCanvas)return;
  sigCtx=sigCanvas.getContext('2d');
  sigCanvas.width=sigCanvas.offsetWidth||320;
  sigCtx.strokeStyle='#111';sigCtx.lineWidth=1.5;sigCtx.lineCap='round';
  const gp=e=>{const r=sigCanvas.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(sigCanvas.width/r.width),y:(s.clientY-r.top)*(sigCanvas.height/r.height)};};
  sigCanvas.onmousedown=sigCanvas.ontouchstart=e=>{e.preventDefault();drawing=true;const p=gp(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);};
  sigCanvas.onmousemove=sigCanvas.ontouchmove=e=>{e.preventDefault();if(!drawing)return;const p=gp(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();};
  sigCanvas.onmouseup=sigCanvas.ontouchend=()=>drawing=false;
}
function clearSig(){if(sigCanvas)sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);}

async function guardarNota(){
  const fc=$('nd-fc').value,fe=$('nd-fe').value,tipo=$('nd-tipo').value;
  const cliente_id=parseInt($('nd-cliente').value)||null;
  const instalacion_id=parseInt($('nd-inst').value)||null;
  const tecnico_id=parseInt($('nd-tec').value)||null;
  const receptor=$('nd-rnombre').value,receptor_rut=$('nd-rrut').value,obs=$('nd-obs').value;
  if(!fc||!cliente_id){alert('Completa la fecha de creación y el cliente.');return;}
  const eqs=[];
  for(let i=0;i<10;i++){const sel=$('eq-sel-'+i);if(sel&&sel.value)eqs.push({equipoId:parseInt(sel.value),cantidad:$('eq-cant-'+i).value||1,retirado:($('eq-ret-'+i)||{}).value||''});}
  const firma=sigCanvas?sigCanvas.toDataURL():null;
  const hasFirma=firma&&sigCtx&&sigCtx.getImageData(0,0,sigCanvas.width,sigCanvas.height).data.some(v=>v!==0);
  const num=nextNumero(ordenes,'OT');
  const {data,error}=await sb.from('ordenes').insert({
    numero:num,fecha_creacion:fc,fecha_ejecucion:fe||null,tipo,
    cliente_id,instalacion_id,tecnico_id,
    receptor,receptor_rut,equipos:eqs,observaciones:obs,
    firma:hasFirma?firma:null,firmado:hasFirma
  }).select().single();
  if(error){toast('Error al guardar: '+error.message,false);return;}
  ordenes.unshift(data);
  toast('OT guardada ✓');
  verNota(data.id);
}

async function guardarInforme(){
  const fecha=$('iv-fecha').value;
  const cliente_id=parseInt($('iv-cliente').value)||null;
  if(!fecha||!cliente_id){alert('Completa la fecha y el cliente.');return;}
  const num=nextNumero(informes,'IV');
  const {data,error}=await sb.from('informes').insert({
    numero:num,fecha,cliente_id,
    instalacion_id:parseInt($('iv-inst').value)||null,
    tecnico_id:parseInt($('iv-tec').value)||null,
    ciudad:$('iv-ciudad').value,direccion:$('iv-dir').value,
    descripcion:$('iv-desc').value,observaciones:$('iv-obs').value,
    recomendaciones:$('iv-rec').value
  }).select().single();
  if(error){toast('Error al guardar: '+error.message,false);return;}
  informes.unshift(data);
  toast('Informe guardado ✓');
  verInforme(data.id);
}

function openModal(type,id){
  const cfg=MODALS[type];
  const cols={cliente:clientes,instalacion:instalaciones,equipo:equipos,tecnico:tecnicos};
  const d=id?cols[type].find(x=>x.id===id):{};
  $('modal-container').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h2>${id?'Editar':'Nuevo'} ${cfg.title}</h2>${cfg.fields(d||{})}
    <div style="display:flex;gap:8px;margin-top:20px;padding-top:14px;border-top:0.5px solid var(--border)">
      <button class="btn btn-primary" onclick="MODALS['${type}'].save(${id||'null'})"><i class="ti ti-device-floppy"></i> Guardar</button>
      <button class="btn" onclick="closeModal()">Cancelar</button>
    </div></div></div>`;
}
  
function closeModal(){$('modal-container').innerHTML='';}
